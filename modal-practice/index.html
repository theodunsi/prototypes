<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Chat Dropdown</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      background: #fff;
    }

    .dropdown-wrapper {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      margin-top: 280px;
      align-self: flex-start;
    }

    .new-chat-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: #000000;
      color: #fff;
      border: none;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      line-height: 24px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .new-chat-btn:hover {
      background: #1a1a1a;
    }

    .new-chat-btn svg {
      flex-shrink: 0;
    }

    .chevron {
      transition: transform 0.25s ease;
      flex-shrink: 0;
    }

    .dropdown-wrapper.open .chevron {
      transform: rotate(180deg);
    }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      width: 200px;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e8e8e8;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
      padding: 2px;
      opacity: 0;
      transform-origin: top center;
      transform: scaleY(0.92) translateY(-4px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      z-index: 10;
    }

    .dropdown-wrapper.open .dropdown-menu {
      opacity: 1;
      transform: scaleY(1) translateY(0);
      pointer-events: auto;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      line-height: 24px;
      color: #171717;
      transition: background 0.12s ease;
      white-space: nowrap;
    }

    .dropdown-item:hover {
      background: #f5f5f5;
    }

    .dropdown-item:hover svg {
      color: #171717;
    }

    .dropdown-item svg {
      flex-shrink: 0;
      color: #737373;
      transition: color 0.2s ease;
    }
  </style>
</head>
<body>
  <div class="dropdown-wrapper" id="dropdown">
    <button class="new-chat-btn" id="toggleBtn">
      <!-- Chat/briefcase icon -->
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
        <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
      </svg>
      New Chat
      <!-- Chevron -->
      <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>

    <div class="dropdown-menu" id="menu">
      <div class="dropdown-item">
        <!-- Chat bubble icon -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Chat
      </div>
      <div class="dropdown-item">
        <!-- Globe/group icon -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        Group
      </div>
      <div class="dropdown-item">
        <!-- Message/envelope icon -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        Message
      </div>
    </div>
  </div>

  <script>
    const dropdown = document.getElementById('dropdown');
    const toggleBtn = document.getElementById('toggleBtn');

    toggleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
      if (!dropdown.contains(e.target)) {
        dropdown.classList.remove('open');
      }
    });

    document.querySelectorAll('.dropdown-item').forEach(item => {
      item.addEventListener('click', () => {
        dropdown.classList.remove('open');
      });
    });
  </script>
</body>
</html>
