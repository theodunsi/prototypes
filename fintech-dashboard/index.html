<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fintech Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: -0.02em;
      background: #E8ECF1;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Balance card dashed border */
    .balance-card {
      border-radius: 20px;
      width: 600px;
      height: 177px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    /* SVG-based dashed border for precise 4px dash control */
    .balance-card-border {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .balance-label {
      font-size: 12px;
      color: #8A919B;
      text-transform: uppercase;
    }

    .balance-amount {
      font-size: 48px;
      color: #1F1F1F;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.04em;
      margin-top: 12px;
    }

    /* Transaction row */
    .txn-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .txn-icon-box {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: #D7E7F7;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .txn-info {
      flex: 1;
      min-width: 0;
    }

    .txn-type {
      font-size: 18px;
      color: #1F1F1F;
    }

    .txn-brand {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 18px;
      color: #8A919B;
      margin-top: 2px;
    }

    .txn-brand svg {
      flex-shrink: 0;
    }

    .txn-amount {
      font-size: 24px;
      color: #1F1F1F;
      white-space: nowrap;
    }

    /* Sidebar strip */
    .sidebar-strip {
      position: fixed;
      left: 40px;
      bottom: 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 50;
    }

    .fab-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #C4C9D0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      transition: none; /* GSAP handles transitions */
    }

    .fab-btn svg path {
      transition: none; /* GSAP handles this */
    }

    .avatar-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      overflow: hidden;
    }

    .avatar-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .search-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Blur overlay — blur animated via GSAP for smooth ramp */
    .blur-overlay {
      position: fixed;
      inset: 0;
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      background: rgba(180, 180, 180, 0);
      z-index: 40;
      pointer-events: none;
    }

    .blur-overlay.active {
      pointer-events: auto;
    }

    /* Action cards container */
    .action-cards {
      position: fixed;
      left: 116px;
      bottom: 36px;
      display: flex;
      gap: 8px;
      z-index: 45;
      pointer-events: none;
    }

    .action-cards.active {
      pointer-events: auto;
    }

    .action-card {
      width: 140px;
      height: 156px;
      background: rgba(31, 31, 31, 0.12);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      opacity: 0;
      transform: translateY(30px);
      transition: background-color 200ms ease;
    }

    .action-card:hover {
      background: rgba(240, 244, 248, 0.7);
    }

    .action-card-label {
      font-size: 22px;
      color: #1F1F1F;
      line-height: 1.1;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .action-card {
        transition: none;
      }
    }
  </style>
</head>

  <script>
    // --- State ---
    let isOpen = false;
    const fabBtn = document.getElementById('fabBtn');
    const fabIcon = document.getElementById('fabIcon');
    const blurOverlay = document.getElementById('blurOverlay');
    const actionCardsContainer = document.getElementById('actionCards');
    const actionCards = document.querySelectorAll('.action-card');

    // Check for reduced motion preference
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Smooth blur helper — animates backdrop-filter blur radius via GSAP
    const blurState = { blur: 0, bgAlpha: 0 };

    function animateBlurIn() {
      blurState.blur = 0;
      blurState.bgAlpha = 0;
      gsap.to(blurState, {
        blur: 20,
        bgAlpha: 0.15,
        duration: 0.7,
        ease: 'power2.out',
        onUpdate: () => {
          blurOverlay.style.backdropFilter = `blur(${blurState.blur}px)`;
          blurOverlay.style.webkitBackdropFilter = `blur(${blurState.blur}px)`;
          blurOverlay.style.background = `rgba(180, 180, 180, ${blurState.bgAlpha})`;
        }
      });
    }

    function animateBlurOut() {
      gsap.to(blurState, {
        blur: 0,
        bgAlpha: 0,
        duration: 0.4,
        ease: 'power2.in',
        onUpdate: () => {
          blurOverlay.style.backdropFilter = `blur(${blurState.blur}px)`;
          blurOverlay.style.webkitBackdropFilter = `blur(${blurState.blur}px)`;
          blurOverlay.style.background = `rgba(180, 180, 180, ${blurState.bgAlpha})`;
        },
        onComplete: () => {
          blurOverlay.classList.remove('active');
          actionCardsContainer.classList.remove('active');
        }
      });
    }

    // --- Open FAB ---
    function openFAB() {
      if (isOpen) return;
      isOpen = true;

      // Kill any running card/overlay tweens to prevent conflicts
      gsap.killTweensOf(actionCards);
      gsap.killTweensOf(blurState);
      gsap.killTweensOf(fabBtn);
      gsap.killTweensOf(fabIcon);
      gsap.killTweensOf(fabIcon.querySelector('path'));

      blurOverlay.classList.add('active');
      actionCardsContainer.classList.add('active');

      if (prefersReducedMotion) {
        fabBtn.style.background = '#1F1F1F';
        fabIcon.querySelector('path').setAttribute('fill', '#FFFFFF');
        fabIcon.style.transform = 'rotate(45deg)';
        blurOverlay.style.backdropFilter = 'blur(20px)';
        blurOverlay.style.webkitBackdropFilter = 'blur(20px)';
        blurOverlay.style.background = 'rgba(180, 180, 180, 0.15)';
        actionCards.forEach(card => {
          card.style.opacity = '1';
          card.style.transform = 'translateY(0)';
        });
        return;
      }

      // FAB: gray → black, icon rotates 45° and turns white
      gsap.to(fabBtn, {
        backgroundColor: '#1F1F1F',
        duration: 0.6,
        ease: 'power2.out'
      });
      gsap.to(fabIcon, {
        rotation: 45,
        duration: 0.55,
        ease: 'sine.inOut'
      });
      gsap.to(fabIcon.querySelector('path'), {
        attr: { fill: '#FFFFFF' },
        duration: 0.55,
        ease: 'sine.inOut'
      });

      // Blur overlay — smooth ramp
      animateBlurIn();

      // Cards stagger in from bottom
      gsap.fromTo(actionCards,
        { opacity: 0, y: 50 },
        {
          opacity: 1,
          y: 0,
          duration: 0.65,
          stagger: 0.1,
          ease: 'power3.out',
          delay: 0.2
        }
      );
    }

    // --- Close FAB ---
    function closeFAB() {
      if (!isOpen) return;
      isOpen = false;

      // Kill any running tweens to prevent conflicts
      gsap.killTweensOf(actionCards);
      gsap.killTweensOf(blurState);
      gsap.killTweensOf(fabBtn);
      gsap.killTweensOf(fabIcon);
      gsap.killTweensOf(fabIcon.querySelector('path'));

      if (prefersReducedMotion) {
        fabBtn.style.background = '#C4C9D0';
        fabIcon.querySelector('path').setAttribute('fill', '#1F1F1F');
        fabIcon.style.transform = 'rotate(0deg)';
        blurOverlay.style.backdropFilter = 'blur(0px)';
        blurOverlay.style.webkitBackdropFilter = 'blur(0px)';
        blurOverlay.style.background = 'rgba(180, 180, 180, 0)';
        blurOverlay.classList.remove('active');
        actionCardsContainer.classList.remove('active');
        actionCards.forEach(card => {
          card.style.opacity = '0';
          card.style.transform = 'translateY(50px)';
        });
        return;
      }

      // All cards slide down together
      gsap.to(actionCards, {
        opacity: 0,
        y: 50,
        duration: 0.3,
        ease: 'power2.in'
      });

      // FAB: black → gray, icon rotates back
      gsap.to(fabBtn, {
        backgroundColor: '#C4C9D0',
        duration: 0.4,
        ease: 'power2.out',
        delay: 0.1
      });
      gsap.to(fabIcon, {
        rotation: 0,
        duration: 0.55,
        ease: 'sine.inOut'
      });
      gsap.to(fabIcon.querySelector('path'), {
        attr: { fill: '#1F1F1F' },
        duration: 0.55,
        ease: 'sine.inOut'
      });

      // Blur overlay — smooth ramp out
      animateBlurOut();
    }

    // --- Toggle ---
    fabBtn.addEventListener('click', () => {
      if (isOpen) {
        closeFAB();
      } else {
        openFAB();
      }
    });

    // Close on overlay click
    blurOverlay.addEventListener('click', closeFAB);

    // Close on Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && isOpen) {
        closeFAB();
      }
    });
  </script>
</body>
</html>
